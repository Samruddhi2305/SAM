version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: sam-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: sam-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://db:27017
      - DATABASE_NAME=asset_management
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      - db
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build: ./frontend
    container_name: sam-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

volumes:
  mongo-data:
